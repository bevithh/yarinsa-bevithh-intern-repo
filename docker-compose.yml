services:
  db:
    image: postgres:16 # Uses a stable, modern version
    container_name: focus_bear_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: focus_bear
    ports:
      - "5432:5432" # Maps port 5432 on your Mac to 5432 in the container
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists your data

volumes:
  postgres_data: # Defines the managed volume